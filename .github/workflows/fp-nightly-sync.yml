# FieldPulse nightly full-sweep (Phase 6 steady state).
#
# WHY ACTIONS AND NOT A VERCEL CRON:
#   The customers sweep walks ~52 pages × ~2,600 encrypted upserts ≈ 20 minutes.
#   Vercel serverless functions max out at 5 minutes even on Pro.
#   GitHub Actions has no wall-clock limit for this job class.
#   The technicians sync runs in seconds and stays in the Vercel daily cron (10:00 UTC).
#
# SCHEDULE RATIONALE (08:30 UTC):
#   Vercel daily crons run at 10:00 (availability) and 11:00 (invoices) UTC.
#   We run the full sweep at 08:30 UTC so fresh customer/job/invoice data is
#   already in the DB before the Vercel crons process it.
#
# REQUIRED SECRETS / VARIABLES (set in repo Settings → Secrets and variables):
#   Secrets:
#     DATABASE_URL      — Neon connection string (postgres://)
#     FIELDPULSE_API_KEY — FieldPulse API key (single-tenant fallback; the
#                          importer also reads the encrypted per-org key from DB)
#     ENCRYPTION_KEY    — 64-char hex string; used to encrypt customer PII
#   Variables:
#     FP_SYNC_ORG_ID    — UUID of the organization to sync
#                         (repo variable, not secret, because it is not sensitive)
#
# CONCURRENCY: cancel-in-progress: false keeps a running sweep alive — a second
# trigger waits rather than killing mid-write. Two concurrent writes of the same
# idempotent upserts would not corrupt data, but waiting is cleaner.

name: fp-nightly-sync

on:
  schedule:
    # 08:30 UTC daily — before Vercel crons at 10:00 and 11:00 UTC
    - cron: "30 8 * * *"
  workflow_dispatch: {}

concurrency:
  group: fp-nightly-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run FieldPulse full sweep
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FIELDPULSE_API_KEY: ${{ secrets.FIELDPULSE_API_KEY }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
        run: |
          npx tsx src/lib/integrations/fieldpulse/import/run-import.ts \
            --org ${{ vars.FP_SYNC_ORG_ID }} \
            --phase technicians,customers,jobs,invoices,estimates,payments,assets,comments,locations,items,job-metrics \
            --yes
