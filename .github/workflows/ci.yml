name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run build --if-present
      - run: npx tsc --noEmit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run lint --if-present

  # Blocking gate: the offline Vitest unit suite. `test:unit` excludes the
  # DB/secret-dependent integration suites (see vitest.config.ts +
  # TESTING.md), so it runs green with no database and gates every PR.
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm run test:unit

  # Non-blocking: the Playwright E2E suite needs a live server + database, which
  # this job does not provision, so a failure here must NOT block merges.
  # continue-on-error keeps the run visible (and its report uploaded) without
  # gating. Remove continue-on-error once a DB-backed environment is wired up.
  e2e:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e --if-present
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security-audit:
    runs-on: ubuntu-latest
    # Advisory only: bare `npm audit` exits 1 on the known, deliberately-deferred
    # CVEs (next/drizzle-kit/promptfoo — fixes are breaking major downgrades), so
    # this hard-failed on every run. Keep the report visible (uploaded/logged)
    # WITHOUT gating merges, like the e2e job. Re-enable gating once the CVEs are
    # actually addressed.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm audit --production
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - run: npm audit --audit-level=moderate
